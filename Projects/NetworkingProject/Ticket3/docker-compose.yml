version: '3'
services:
  api-server:
    build: 
      context: .
      dockerfile: Dockerfile.api
    container_name: api-server
    networks:
      server_net:
        ipv4_address: 10.0.0.75

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: client
    networks:
      client_net:
        ipv4_address: 10.1.0.20
    command: tail -f /dev/null

networks:
  server_net:
    ipam:
      config:
        - subnet: 10.0.0.0/24
  client_net:
    ipam:
      config:
        - subnet: 10.1.0.0/24